# =====================================================
# Render Blueprint — Frontend + Backend (Render) + Neon DB
# =====================================================
# Deploy: https://render.com -> New -> Blueprint
#
# This blueprint deploys both:
#   - Laravel backend on Render
#   - Nuxt frontend on Render
# Database remains on Neon (manual DB_* env vars).
#
# Required manual env vars:
#   Backend APP_URL=https://<your-backend>.onrender.com
#   Backend FRONTEND_URL=https://<your-frontend-domain> (custom domain or *.onrender.com)
#   Backend SANCTUM_STATEFUL_DOMAINS=<host only, no https://> — comma-separated if multiple
#   Optional: CORS_ALLOWED_ORIGINS=https://<old>.onrender.com (comma-separated) if you need two front origins
#   Backend DB_HOST/DB_DATABASE/DB_USERNAME/DB_PASSWORD from Neon
#   Frontend NUXT_PUBLIC_API_URL=https://<your-backend>.onrender.com/api
# =====================================================

services:
  # -------------------------------------------------
  # Backend — Laravel 11 API
  # -------------------------------------------------
  - type: web
    name: kalapak-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_NAME
        value: "Kalapak Code Team"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: local
      # ── Upstash Redis ──
      - key: REDIS_CLIENT
        value: predis
      - key: REDIS_SCHEME
        value: tls
      - key: REDIS_HOST
        value: living-tadpole-83117.upstash.io
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false # Set in Render dashboard
      - key: CACHE_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: TURNSTILE_SECRET_KEY
        sync: false # Set manually: get from Cloudflare Dashboard → Turnstile → your site → Secret Key
      # ── Mail (required for Forgot Password emails) ──
      # Use Resend (resend.com), Mailgun, or any SMTP provider
      - key: MAIL_MAILER
        sync: false # e.g. smtp
      - key: MAIL_HOST
        sync: false # e.g. smtp.resend.com  or smtp.mailgun.org
      - key: MAIL_PORT
        sync: false # e.g. 587
      - key: MAIL_USERNAME
        sync: false # e.g. resend (for Resend) or your Mailgun username
      - key: MAIL_PASSWORD
        sync: false # your SMTP API key / password
      - key: MAIL_ENCRYPTION
        sync: false # tls
      - key: MAIL_FROM_ADDRESS
        sync: false # e.g. noreply@yourdomain.com
      - key: MAIL_FROM_NAME
        value: "Kalapak Code Team"
      - key: CLOUDINARY_URL
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ENDPOINT
        sync: false
      - key: SUPABASE_ACCESS_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_REGION
        sync: false

  # -------------------------------------------------
  # Frontend — Nuxt 3
  # -------------------------------------------------
  - type: web
    name: kalapak-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NUXT_PUBLIC_API_URL
        sync: false
      - key: NUXT_PUBLIC_SITE_URL
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: VITE_BASE_URL
        sync: false
      - key: VITE_APP_ENV
        value: production
      - key: VITE_APP_NAME
        value: Kalapak Team
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
      - key: VITE_WITH_CREDENTIALS
        value: "true"
